project: payment-retry

tasks:
  - id: task-001-retry-policy
    title: Add retry policy model
    story: story-001-retry-policy
    status: done
    owner: builder
    reviewer: verifier
    depends_on: []
    files_expected:
      - src/payment/retryPolicy.ts
      - src/payment/retryPolicy.test.ts
    acceptance:
      - timeout is retryable
      - hard decline is not retryable
      - max retry count is enforced
