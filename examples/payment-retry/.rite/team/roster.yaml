team:
  manager:
    role_file: .rite/team/roles/manager.md
    owns:
      - board.yaml
      - status-report.md
      - blockers.md

  product_analyst:
    role_file: .rite/team/roles/product-analyst.md
    owns:
      - brief.md
      - prd.md
      - spec.md
      - open-questions.md

  architect:
    role_file: .rite/team/roles/architect.md
    owns:
      - architecture.md
      - adr/
      - risk-register.md

  tech_lead:
    role_file: .rite/team/roles/tech-lead.md
